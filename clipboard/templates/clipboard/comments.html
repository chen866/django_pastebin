<div class="comments-section">
    <h3>评论 (<span id="comment-count">0</span>)</h3>
    
    <div id="comment-list" class="comment-list">
        <!-- 评论通过 JavaScript 动态加载 -->
    </div>
    
    <p id="no-comments" class="no-comments">暂无评论，来发表第一个评论吧！</p>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    const slug = "{{ snippet.slug }}";
    const commentList = document.getElementById('comment-list');
    const noComments = document.getElementById('no-comments');
    const commentCount = document.getElementById('comment-count');
    
    function formatDate(isoString) {
        const date = new Date(isoString);
        return date.toLocaleString('zh-CN', {
            year: 'numeric',
            month: '2-digit',
            day: '2-digit',
            hour: '2-digit',
            minute: '2-digit'
        });
    }
    
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    function renderComment(comment) {
        return `
            <div class="comment-card">
                <div class="comment-header">
                    <span class="comment-author">${escapeHtml(comment.user)}</span>
                    <span class="comment-date">${formatDate(comment.created_at)}</span>
                </div>
                <div class="comment-body">
                    ${escapeHtml(comment.content).replace(/\n/g, '<br>')}
                </div>
            </div>
        `;
    }
    
    function loadComments() {
        fetch(`/c/${slug}/comments/`)
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    console.error(data.error);
                    return;
                }
                
                const comments = data.comments || [];
                commentCount.textContent = comments.length;
                
                if (comments.length > 0) {
                    commentList.innerHTML = comments.map(renderComment).join('');
                    noComments.style.display = 'none';
                } else {
                    commentList.innerHTML = '';
                    noComments.style.display = 'block';
                }
            })
            .catch(error => {
                console.error('加载评论失败:', error);
            });
    }
    
    // 暴露到全局供 comment_form.html 调用
    window.reloadComments = loadComments;
    
    loadComments();
});
</script>
