<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>新建剪贴板</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f9fafb;
            --surface: #ffffff;
            --text: #1f2937;
            --text-muted: #6b7280;
            --border: #e5e7eb;
            --radius: 8px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        
        body {
            background-color: var(--bg);
            color: var(--text);
            max-width: 800px;
            margin: 40px auto;
            font-family: system-ui, -apple-system, sans-serif;
            line-height: 1.5;
            padding: 0 20px;
        }

        .container {
            background: var(--surface);
            padding: 30px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        h2 { margin-top: 0; color: var(--text); }
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .btn-list {
            background-color: var(--surface);
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }
        .btn-list:hover {
            background-color: var(--primary);
            color: white;
        }
        .error { color: #dc2626; background: #fef2f2; padding: 10px; border-radius: 6px; margin-bottom: 20px; border: 1px solid #f87171; }
        
        textarea {
            width: 100%;
            box-sizing: border-box;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-family: inherit;
            font-size: 14px;
            resize: vertical;
            transition: all 0.2s;
            margin-bottom: 20px;
        }

        .settings-group {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 25px;
            background: var(--bg);
            padding: 15px;
            border-radius: 6px;
            border: 1px solid var(--border);
        }

        label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-muted);
        }

        input[type="text"], select {
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.2s;
            background: var(--surface);
        }

        textarea:focus, input[type="text"]:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: background-color 0.2s;
            width: 100%;
        }

        button:hover { background-color: var(--primary-hover); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-row">
            <h2>新建剪贴板</h2>
            <a href="{% url 'list_snippets' %}" class="btn-list">查看列表</a>
        </div>
        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}
        
        <form method="post">
            {% csrf_token %}
            <textarea name="content" rows="15" placeholder="在此粘贴你的代码或文本..." required>{{ form_data.content|default:'' }}</textarea>
            
            <div class="settings-group">
                <label>格式:
                    <select name="format_type" >
                        <option value="text" {% if form_data.format_type == 'text' %}selected{% endif %}>纯文本</option>
                        <option value="markdown" {% if form_data.format_type == 'markdown' %}selected{% endif %}>Markdown</option>
                    </select>
                </label>
                <label>后缀:
                    <input type="text" name="slug" placeholder="可选自定义URL" value="{% if form_data.slug %}{{ form_data.slug | default:'' }}{% endif %}">
                </label>
                <label>过期时间:
                    <select name="expiry">
                        {% for choice in expiry_choices %}
                            <option value="{{ choice.value }}" {% if form_data.expiry == choice.value %}selected{% endif %}>{{ choice.label }}</option>
                        {% endfor %}
                    </select>
                </label>
            </div>
            
            <button type="submit">保存内容</button>
        </form>
    </div>
</body>
</html>
