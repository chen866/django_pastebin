<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>新建剪贴板</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f9fafb;
            --surface: #ffffff;
            --text: #1f2937;
            --text-muted: #6b7280;
            --border: #e5e7eb;
            --radius: 8px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        
        body {
            background-color: var(--bg);
            color: var(--text);
            max-width: 800px;
            margin: 40px auto;
            font-family: system-ui, -apple-system, sans-serif;
            line-height: 1.5;
            padding: 0 20px;
        }

        .container {
            background: var(--surface);
            padding: 30px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        h2 { margin-top: 0; color: var(--text); }
        .error { color: #dc2626; background: #fef2f2; padding: 10px; border-radius: 6px; margin-bottom: 20px; border: 1px solid #f87171; }
        
        textarea {
            width: 100%;
            box-sizing: border-box;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-family: inherit;
            font-size: 14px;
            resize: vertical;
            transition: all 0.2s;
            margin-bottom: 20px;
        }

        .settings-group {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 25px;
            background: var(--bg);
            padding: 15px;
            border-radius: 6px;
            border: 1px solid var(--border);
        }

        label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-muted);
        }

        input[type="text"], select {
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.2s;
            background: var(--surface);
        }

        textarea:focus, input[type="text"]:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: background-color 0.2s;
            width: 100%;
        }

        button:hover { background-color: var(--primary-hover); }
    </style>
</head>
<body>
    <div class="container">
        <h2>新建剪贴板</h2>
        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}
        
        <form method="post">
            {% csrf_token %}
            <textarea name="content" rows="15" placeholder="在此粘贴你的代码或文本..." required></textarea>
            
            <div class="settings-group">
                <label>格式:
                    <select name="format_type">
                        <option value="text">纯文本</option>
                        <option value="markdown">Markdown</option>
                    </select>
                </label>
                <label>后缀:
                    <input type="text" name="slug" placeholder="可选自定义URL">
                </label>
                <label>过期时间:
                    <select name="expiry">
                        <option value="1">1 小时</option>
                        <option value="24" selected>24 小时</option>
                        <option value="168">7 天</option>
                        <option value="744">1 个月</option>
                        <option value="1488">2 个月</option>
                        <option value="2232">3 个月</option>
                        <option value="4464">6 个月</option>
                        <option value="8760">1 年</option>
                    </select>
                </label>
            </div>
            
            <button type="submit">保存内容</button>
        </form>
    </div>
</body>
</html>
