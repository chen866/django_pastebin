
<!DOCTYPE html>
<html lang="zh">
<head>
    <title>新建剪贴板</title>
    <style>body { max-width: 800px; margin: 40px auto; font-family: sans-serif; }</style>
</head>
<body>
    <h2>新建剪贴板</h2>
    {% if error %}<p style="color:red;">{{ error }}</p>{% endif %}
    <form method="post">
        {% csrf_token %}
        <textarea name="content" rows="15" style="width: 100%;" required></textarea>
        <br><br>
        <label>格式:
            <select name="format_type">
                <option value="text">纯文本</option>
                <option value="markdown">Markdown</option>
            </select>
        </label>
        <label>后缀:
            <input type="text" name="slug" value="">
        </label>
        <label>过期时间:
            <select name="expiry">
                <option value="1">1 小时</option>
                <option value="24" selected>24 小时</option>
                <option value="168">7 天</option>
            </select>
        </label>
        <button type="submit">保存</button>
    </form>
</body>
</html>
