
<!DOCTYPE html>
<html lang="zh">
<head>
    <title>查看剪贴板</title>
    <style>body { max-width: 800px; margin: 40px auto; font-family: sans-serif; }</style>
    <!-- 引入 GitHub 风格的 Markdown CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown.min.css">
    <!-- 引入 highlight.js 主题 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github.min.css">
</head>
<body>
    <div style="margin-bottom: 20px;">
        <a href="{% url 'create_snippet' %}">← 新建</a>
        <span style="float:right; color:#666;">
            过期时间: {{ snippet.expires_at|date:"Y-m-d H:i" }} 
            (格式: {{ snippet.get_format_type_display }})
        </span>
    </div>

    <hr>

    {% if snippet.format_type == 'text' %}
        <pre style="white-space: pre-wrap; word-wrap: break-word;">{{ snippet.content }}</pre>
    {% elif snippet.format_type == 'markdown' %}
        <div id="raw-content" style="display:none;">{{ snippet.content|escape }}</div>
        <div id="rendered-content" class="markdown-body"></div>

        <!-- 引入依赖 -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.3/purify.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>

        <script>
            document.addEventListener("DOMContentLoaded", function() {
                var rawDiv = document.getElementById('raw-content');
                var rawText = rawDiv.innerText || rawDiv.textContent;

                // 配置 marked 使用 highlight.js 
                marked.setOptions({
                    highlight: function(code, lang) {
                        if (lang && hljs.getLanguage(lang)) {
                            return hljs.highlight(code, { language: lang }).value;
                        }
                        return hljs.highlightAuto(code).value;
                    }
                });

                var dirtyHtml = marked.parse(rawText);
                var cleanHtml = DOMPurify.sanitize(dirtyHtml);
                document.getElementById('rendered-content').innerHTML = cleanHtml;
            });
        </script>
    {% endif %}
</body>
</html>
